services:
  # ── Flask API ──────────────────────────────────────────────────────────────
  - type: web
    name: trade-tutor-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn -c gunicorn.conf.py app.wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: DATABASE_URL
        fromDatabase:
          name: trade-tutor-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://tradetutor.vercel.app   # Update to your actual Vercel URL
      - key: OPENAI_API_KEY
        sync: false                  # Set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_YEARLY
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_API_BASE
        value: https://api-m.paypal.com
      - key: PAYPAL_PLAN_STARTER_MONTHLY
        sync: false
      - key: PAYPAL_PLAN_STARTER_YEARLY
        sync: false
      - key: PAYPAL_PLAN_PRO_MONTHLY
        sync: false
      - key: PAYPAL_PLAN_PRO_YEARLY
        sync: false

  # ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: trade-tutor-db
    databaseName: trade_tutor
    user: trade_tutor
    plan: free
